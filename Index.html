<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio de Garela | Mediterranean Pink Elegance</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Monsieur+La+Doulaise&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* --- COLOR PALETTE & GLOBAL VARIABLES --- */
:root {
--bg-palazzo-pink: #FFF0F2; /* Sun-bleached Mediterranean pink palace walls */
--main-baby-pink: #FFC0CB; /* Classic sweet coquette baby pink */
--terracotta-gold: #E89E9B; /* Warm Mediterranean tile gold-blush */
--deep-amalfi-rose: #C36A7A; /* Deep rich rose accent for typography */
--text-olive-charcoal: #4A3E40; /* Soft dark earthy charcoal with a hint of warm tone */
--pure-white: #FFFFFF;
}

* {
box-sizing: border-box;
margin: 0;
padding: 0;
font-family: 'Poppins', sans-serif;
}

body {
background-color: var(--bg-palazzo-pink);
color: var(--text-olive-charcoal);
overflow-x: hidden;
/* Mediterranean Majolica / Portuguese Tile Tile Motif made subtler and pinker */
background-image:
radial-gradient(circle at 50% 50%, rgba(255, 192, 203, 0.15) 20%, transparent 20%, transparent 80%, rgba(255, 192, 203, 0.15) 80%),
radial-gradient(circle at 0% 0%, rgba(232, 158, 155, 0.1) 40%, transparent 40%),
radial-gradient(circle at 100% 0%, rgba(232, 158, 155, 0.1) 40%, transparent 40%),
radial-gradient(circle at 100% 100%, rgba(232, 158, 155, 0.1) 40%, transparent 40%),
radial-gradient(circle at 0% 100%, rgba(232, 158, 155, 0.1) 40%, transparent 40%);
background-size: 40px 40px;
}

/* --- LOGO & HEADER --- */
header {
background: linear-gradient(to bottom, #FFFFFF, var(--bg-palazzo-pink));
padding: 50px 20px;
text-align: center;
border-bottom: 3px double var(--main-baby-pink);
position: relative;
}

/* Architectural Arch motif behind the header */
header::before {
content: '';
position: absolute;
bottom: 0;
left: 50%;
transform: translateX(-50%);
width: 180px;
height: 90px;
background: rgba(255, 255, 255, 0.4);
border-radius: 90px 90px 0 0;
z-index: 0;
}

.logo-container {
max-width: 600px;
margin: 0 auto;
position: relative;
z-index: 1;
}

.logo-main {
font-family: 'Cinzel', serif;
font-size: 3rem;
font-weight: 400;
color: var(--text-olive-charcoal);
line-height: 1.1;
letter-spacing: 4px;
text-transform: uppercase;
}

.logo-sub {
font-family: 'Monsieur La Doulaise', cursive;
font-size: 4.8rem;
color: var(--deep-amalfi-rose);
line-height: 0.6;
margin-bottom: 10px;
display: block;
}

.tagline {
font-family: 'Cinzel', serif;
font-size: 0.75rem;
letter-spacing: 4px;
text-transform: uppercase;
color: var(--terracotta-gold);
margin-top: 15px;
font-weight: 600;
}

.bow-divider {
color: var(--main-baby-pink);
font-size: 1.6rem;
margin: 12px 0;
user-select: none;
letter-spacing: 3px;
}

/* --- MEDITERRANEAN RIBBON NAVIGATION --- */
.nav-wrapper {
max-width: 1200px;
margin: 0 auto;
display: flex;
justify-content: center;
align-items: center;
padding: 35px 20px 15px 20px;
}

.collection-filters {
display: flex;
gap: 15px;
flex-wrap: wrap;
justify-content: center;
background: rgba(255, 255, 255, 0.7);
padding: 10px 25px;
border-radius: 30px;
border: 1px solid rgba(255, 192, 203, 0.5);
box-shadow: 0 4px 15px rgba(232, 158, 155, 0.1);
}

.collection-filters a {
text-decoration: none;
color: var(--text-olive-charcoal);
font-family: 'Cinzel', serif;
font-weight: 600;
font-size: 0.9rem;
letter-spacing: 1px;
cursor: pointer;
transition: all 0.3s ease;
padding: 6px 16px;
border-radius: 20px;
display: flex;
align-items: center;
gap: 5px;
}

.collection-filters a:hover, .collection-filters a.active {
color: var(--pure-white);
background-color: var(--main-baby-pink);
transform: translateY(-2px);
}

/* --- CONTAINER STRUCTURE --- */
.container {
max-width: 1200px;
margin: 0 auto;
padding: 20px 20px 40px 20px;
}

.section-title {
text-align: center;
font-family: 'Cinzel', serif;
font-size: 2.2rem;
margin-bottom: 45px;
font-weight: 400;
color: var(--text-olive-charcoal);
letter-spacing: 2px;
}

.section-title::after {
content: '🍊 ୨୧ 🧡 ୨୧ 🍊';
display: block;
font-size: 0.9rem;
color: var(--terracotta-gold);
margin-top: 10px;
letter-spacing: 8px;
}

/* --- PRODUCTS MODULE (Mediterranean Arched Cards) --- */
.products-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 40px;
margin-bottom: 60px;
}

.product-card {
background-color: var(--pure-white);
border-radius: 120px 120px 20px 20px; /* Stunning Palazzo Villa Arch style top */
overflow: hidden;
box-shadow: 0 10px 30px rgba(232, 158, 155, 0.15);
border: 1px solid rgba(255, 192, 203, 0.4);
transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
display: flex;
flex-direction: column;
position: relative;
}

.product-card:hover {
transform: translateY(-8px);
box-shadow: 0 16px 35px rgba(195, 106, 122, 0.25);
}

.product-preview {
height: 300px;
background: linear-gradient(180deg, rgba(255, 240, 242, 0.5) 0%, rgba(255, 192, 203, 0.3) 100%);
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
position: relative;
color: var(--deep-amalfi-rose);
font-size: 4rem;
border-bottom: 1px dashed var(--main-baby-pink);
}

/* Ribbon Tie overlays on the arches */
.product-preview::before {
content: '୨୧';
position: absolute;
top: 25px;
font-size: 1.5rem;
color: var(--main-baby-pink);
background: var(--pure-white);
padding: 2px 10px;
border-radius: 20px;
box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.product-tag {
font-family: 'Cinzel', serif;
font-size: 0.7rem;
text-transform: uppercase;
letter-spacing: 2px;
color: var(--terracotta-gold);
margin-top: 15px;
font-weight: 600;
}

.product-details {
padding: 25px 20px;
text-align: center;
flex-grow: 1;
display: flex;
flex-direction: column;
justify-content: space-between;
background: linear-gradient(to bottom, #FFFFFF, var(--bg-palazzo-pink));
}

.product-name {
font-family: 'Cinzel', serif;
font-size: 1.15rem;
color: var(--text-olive-charcoal);
margin-bottom: 8px;
font-weight: 600;
line-height: 1.3;
}

.product-cost {
color: var(--deep-amalfi-rose);
font-family: 'Poppins', sans-serif;
font-weight: 600;
font-size: 1.3rem;
margin-bottom: 6px;
}

/* --- MEDITERRANEAN RIBBON BUTTON --- */
.order-action-container {
text-align: center;
margin: 50px auto 20px auto;
max-width: 420px;
}

.global-order-btn {
background: linear-gradient(135deg, var(--main-baby-pink) 0%, var(--terracotta-gold) 100%);
color: var(--pure-white);
border: none;
padding: 18px 40px;
border-radius: 40px;
cursor: pointer;
font-family: 'Cinzel', serif;
font-size: 1.2rem;
letter-spacing: 3px;
text-transform: uppercase;
transition: all 0.3s ease;
width: 100%;
box-shadow: 0 10px 25px rgba(195, 106, 122, 0.3);
font-weight: 600;
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
}

.global-order-btn:hover {
background: linear-gradient(135deg, var(--deep-amalfi-rose) 0%, var(--main-baby-pink) 100%);
transform: scale(1.03) translateY(-2px);
box-shadow: 0 14px 30px rgba(195, 106, 122, 0.45);
}

/* --- FOOTER REGION --- */
footer {
text-align: center;
padding: 60px 20px;
margin-top: 80px;
border-top: 3px double var(--main-baby-pink);
background: linear-gradient(to bottom, var(--bg-palazzo-pink), #FFFFFF);
color: var(--text-olive-charcoal);
font-size: 0.85rem;
}

footer p { margin-bottom: 8px; }
</style>
</head>
<body>

<div class="logo-container">

<span class="logo-sub">de Garela</span>
<div class="bow-divider">... ୨୧ ⚜ ୨୧ ...</div>

</header>

<div class="nav-wrapper">

</div>

<div class="container">

<div class="order-action-container">

</section>

</div>

// STARTUP HOOK
document.addEventListener("DOMContentLoaded", () => {
renderCatalogGrid('all');

// FILTER MANAGEMENT
function filterCatalog(category) {
document.querySelectorAll('.collection-filters a').forEach(el => el.classList.remove('active'));

const filterIds = {
'all': 'filter-all',
'Charms': 'filter-charms',
'His and Hers': 'filter-his-hers',
'Jewelries': 'filter-jewelry',
'Phone Models': 'filter-phone-models'
};

document.getElementById(filterIds[category]).classList.add('active');
renderCatalogGrid(category);
}

// CATALOG VIEW GENERATOR
function renderCatalogGrid(category) {
const container = document.getElementById('catalog-injection-point');
const targetedSubset = category === 'all' ? studioProducts : studioProducts.filter(p => p.category === category);

container.innerHTML = targetedSubset.map(product => `
<div class="product-card">
<div class="product-preview">
<div>${product.icon}</div>
<span class="product-tag">${product.category}</span>
</div>
<div class="product-details">
<h3 class="product-name">${product.name}</h3>
<div>
<p class="product-cost">₱${product.price.toFixed(2)}</p>
</div>
</div>
</div>
`).join('');
}

// REDIRECT ACTION ENGINE
function redirectToOrderForm() {

}
