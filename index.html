<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Studio de Garela | Mediterranean Pink Elegance</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Monsieur+La+Doulaise&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* --- COLOR PALETTE & GLOBAL VARIABLES --- */
:root {
--bg-palazzo-pink: #FFF0F2;
--main-baby-pink: #FFC0CB;
--terracotta-gold: #E89E9B;
--deep-amalfi-rose: #C36A7A;
--text-olive-charcoal: #4A3E40;
--pure-white: #FFFFFF;
--sale-red: #E04D50;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }

body { background-color: var(--bg-palazzo-pink); color: var(--text-olive-charcoal); overflow-x: hidden; background-image: radial-gradient(circle at 50% 50%, rgba(255, 192, 203, 0.15) 20%, transparent 20%, transparent 80%, rgba(255, 192, 203, 0.15) 80%), radial-gradient(circle at 0% 0%, rgba(232, 158, 155, 0.1) 40%, transparent 40%), radial-gradient(circle at 100% 0%, rgba(232, 158, 155, 0.1) 40%, transparent 40%); background-size: 40px 40px; }

/* --- ANIMATIONS & CORE LAYOUT --- */
@keyframes universalEntrance { from { opacity: 0; transform: translateY(30px); filter: blur(5px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }
@keyframes globalLogoFloat { 0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 10px 15px rgba(195, 106, 122, 0.15)); } 50% { transform: translateY(-6px) scale(1.02); } }
@keyframes continuousMetallicFlow { 0% { background-position: 0% 50%; } 100% { background-position: 0% 50%; } }
@keyframes elegantCardGlint { 0% { left: -150%; } 100% { left: 150%; } }

header { background: linear-gradient(to bottom, #FFFFFF, var(--bg-palazzo-pink)); padding: 50px 20px 55px 20px; text-align: center; border-bottom: 3px double var(--main-baby-pink); position: relative; animation: universalEntrance 1.2s cubic-bezier(0.16, 1, 0.3, 1) both; }

.logo-container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
.brand-logo-img { width: clamp(130px, 15vw, 175px); height: clamp(130px, 15vw, 175px); border-radius: 50%; animation: globalLogoFloat 5s infinite ease-in-out; }
.logo-main { font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 6vw, 3.8rem); font-weight: 400; color: var(--text-olive-charcoal); letter-spacing: 6px; text-transform: uppercase; }
.logo-sub { font-family: 'Monsieur La Doulaise', cursive; font-size: clamp(4.5rem, 10vw, 5.8rem); background: linear-gradient(90deg, var(--deep-amalfi-rose), #F391A1, var(--terracotta-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

/* --- PRODUCT GRID & NEW PRICE STYLING --- */
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(clamp(145px, 22vw, 275px), 1fr)); gap: clamp(15px, 3vw, 35px); margin-bottom: 50px; }
.product-card { background-color: var(--pure-white); border-radius: 60px 60px 24px 24px; border: 1px solid rgba(255, 192, 203, 0.35); padding: 20px; cursor: pointer; animation: universalEntrance 1s both; }

/* The Requested Price Styling */
.price-container { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-top: 10px; }
.highlight-price-box { background-color: #FFE3E7; padding: 4px 12px; border-radius: 8px; border: 1px solid rgba(224, 77, 80, 0.1); }
.product-cost { color: var(--sale-red); font-weight: 800; font-size: 1.25rem; margin: 0; }
.product-original-cost { color: #A59A9C; font-size: 0.9rem; font-weight: 300; position: relative; display: inline-block; padding: 0 4px; }
.product-original-cost::after { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 1.5px; background-color: #A59A9C; transform: rotate(-15deg); transform-origin: center; }

.sale-badge { position: absolute; top: 15px; right: 15px; background: var(--sale-red); color: white; font-size: 0.75rem; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; }
.product-preview { height: 250px; background: #FFF0F2; display: flex; align-items: center; justify-content: center; overflow: hidden; border-bottom: 1px dashed var(--main-baby-pink); }
.product-img { width: 100%; height: 100%; object-fit: cover; }
.product-details { padding: 20px; text-align: center; }

/* --- MODALS & FOOTER (Kept as per your original file) --- */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(74,62,64,0.85); z-index: 2000; justify-content: center; align-items: center; }
.modal-card { background: white; padding: 30px; border-radius: 28px; max-width: 460px; width: 90%; }
</style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="StudiodeGarela.jpg.png" alt="Logo" class="brand-logo-img">
        <h1 class="logo-main">Studio</h1>
        <div class="logo-sub">de Garela</div>
    </div>
</header>

<div class="products-grid" id="catalog-injection-point"></div>

<script>
const studioProducts = [
    { id: 30, name: "iPhone 13 Case Bundle", price: 259, originalPrice: 349, image: "Iphone 13.jpg", bundle: "Charms, Ribbons & Ponytails", samples: ["Iphone 13.jpg"] },
    { id: 31, name: "iPhone 13 Pro Case Bundle", price: 259, originalPrice: 349, image: "placeholder.jpg", bundle: "Charms, Ribbons & Ponytails", samples: [] },
    /* Add remaining products here */
];

function renderCatalogGrid() {
    const container = document.getElementById('catalog-injection-point');
    container.innerHTML = studioProducts.map((product, index) => `
        <div class="product-card" onclick="triggerSampleGallery(${index})">
            <div class="sale-badge">Sale!</div>
            <div class="product-preview"><img src="${product.image}" class="product-img"></div>
            <div class="product-details">
                <h3 class="product-name">${product.name}</h3>
                <div class="price-container">
                    <div class="highlight-price-box">
                        <p class="product-cost">₱${product.price.toFixed(2)}</p>
                    </div>
                    <p class="product-original-cost">₱${product.originalPrice.toFixed(2)}</p>
                </div>
            </div>
        </div>
    `).join('');
}
renderCatalogGrid();
</script>
</body>
</html>
