<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio de Garela | Mediterranean Pink Elegance</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Monsieur+La+Doulaise&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* --- COLOR PALETTE & GLOBAL VARIABLES --- */
:root {
--bg-palazzo-pink: #FFF0F2;
--main-baby-pink: #FFC0CB;
--terracotta-gold: #E89E9B;
--deep-amalfi-rose: #C36A7A;
--text-olive-charcoal: #4A3E40;
--pure-white: #FFFFFF;
--sale-red: #D9383A;
}

* {
box-sizing: border-box;
margin: 0;
padding: 0;
font-family: 'Poppins', sans-serif;
scroll-behavior: smooth;
}

body {
background-color: var(--bg-palazzo-pink);
color: var(--text-olive-charcoal);
overflow-x: hidden;
background-image:
radial-gradient(circle at 50% 50%, rgba(255, 192, 203, 0.15) 20%, transparent 20%, transparent 80%, rgba(255, 192, 203, 0.15) 80%),
radial-gradient(circle at 0% 0%, rgba(232, 158, 155, 0.1) 40%, transparent 40%),
radial-gradient(circle at 100% 0%, rgba(232, 158, 155, 0.1) 40%, transparent 40%),
radial-gradient(circle at 100% 100%, rgba(232, 158, 155, 0.1) 40%, transparent 40%),
radial-gradient(circle at 0% 100%, rgba(232, 158, 155, 0.1) 40%, transparent 40%);
background-size: 40px 40px;
}

/* --- ENTRANCE ANIMATIONS --- */
@keyframes fadeInDown {
from { opacity: 0; transform: translateY(-20px); }
to { opacity: 1; transform: translateY(0); }
}

@keyframes cardEntrance {
from { opacity: 0; transform: translateY(30px); }
to { opacity: 1; transform: translateY(0); }
}

@keyframes pulseHint {
0%, 100% { transform: scale(1); opacity: 0.8; }
50% { transform: scale(1.04); opacity: 1; color: var(--terracotta-gold); }
}

@keyframes buttonPulse {
0% { box-shadow: 0 0 0 0 rgba(195, 106, 122, 0.4); }
70% { box-shadow: 0 0 0 15px rgba(195, 106, 122, 0); }
100% { box-shadow: 0 0 0 0 rgba(195, 106, 122, 0); }
}

/* --- LOGO & HEADER --- */
header {
background: linear-gradient(to bottom, #FFFFFF, var(--bg-palazzo-pink));
padding: 50px 20px;
text-align: center;
border-bottom: 3px double var(--main-baby-pink);
position: relative;
animation: fadeInDown 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
}

header::before {
content: '';
position: absolute;
bottom: 0;
left: 50%;
transform: translateX(-50%);
width: 180px;
height: 90px;
background: rgba(255, 255, 255, 0.4);
border-radius: 90px 90px 0 0;
z-index: 0;
}

.logo-container {
max-width: 600px;
margin: 0 auto;
position: relative;
z-index: 1;
}

.logo-main {
font-family: 'Cinzel', serif;
font-size: 3rem;
font-weight: 400;
color: var(--text-olive-charcoal);
line-height: 1.1;
letter-spacing: 4px;
text-transform: uppercase;
}

.logo-sub {
font-family: 'Monsieur La Doulaise', cursive;
font-size: 4.8rem;
color: var(--deep-amalfi-rose);
line-height: 0.6;
margin-bottom: 10px;
display: block;
}

.tagline {
font-family: 'Cinzel', serif;
font-size: 0.75rem;
letter-spacing: 4px;
text-transform: uppercase;
color: var(--terracotta-gold);
margin-top: 15px;
font-weight: 600;
}

.bow-divider {
color: var(--main-baby-pink);
font-size: 1.6rem;
margin: 12px 0;
user-select: none;
letter-spacing: 3px;
}

/* --- CONTAINER STRUCTURE --- */
.container {
max-width: 1200px;
margin: 0 auto;
padding: 40px 20px;
}

.section-title {
text-align: center;
font-family: 'Cinzel', serif;
font-size: 2.2rem;
margin-bottom: 45px;
font-weight: 400;
color: var(--text-olive-charcoal);
letter-spacing: 2px;
}

.section-title::after {
content: '🍊 ୨୧ 🧡 ୨୧ 🍊';
display: block;
font-size: 0.9rem;
color: var(--terracotta-gold);
margin-top: 10px;
letter-spacing: 8px;
}

/* --- PRODUCTS GRID & CARD DESIGN --- */
.products-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 40px;
margin-bottom: 60px;
}

.product-card {
background-color: var(--pure-white);
border-radius: 120px 120px 20px 20px;
overflow: hidden;
box-shadow: 0 10px 30px rgba(232, 158, 155, 0.12);
border: 1px solid rgba(255, 192, 203, 0.4);
display: flex;
flex-direction: column;
position: relative;
cursor: pointer;
opacity: 0;
animation: cardEntrance 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border-color 0.4s ease;
}

.product-card:hover {
transform: translateY(-10px);
box-shadow: 0 20px 40px rgba(195, 106, 122, 0.22);
border-color: var(--main-baby-pink);
}

.sale-badge {
position: absolute;
top: 25px;
right: 25px;
background-color: var(--sale-red);
color: var(--pure-white);
font-family: 'Cinzel', serif;
font-size: 0.75rem;
font-weight: 600;
padding: 4px 14px;
border-radius: 20px;
letter-spacing: 1px;
z-index: 10;
text-transform: uppercase;
transition: transform 0.3s ease;
}

.product-card:hover .sale-badge {
transform: scale(1.08);
}

.product-preview {
height: 320px;
background: linear-gradient(180deg, rgba(255, 240, 242, 0.5) 0%, rgba(255, 192, 203, 0.3) 100%);
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
position: relative;
overflow: hidden;
border-bottom: 1px dashed var(--main-baby-pink);
}

.product-img {
width: 100%;
height: 100%;
object-fit: cover;
transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
}

/* Beautiful dynamic photo growth zoom */
.product-card:hover .product-img {
transform: scale(1.06);
}

.product-details {
padding: 25px 20px;
text-align: center;
flex-grow: 1;
display: flex;
flex-direction: column;
justify-content: space-between;
background: linear-gradient(to bottom, #FFFFFF, var(--bg-palazzo-pink));
}

.product-name {
font-family: 'Cinzel', serif;
font-size: 1.15rem;
color: var(--text-olive-charcoal);
margin-bottom: 4px;
font-weight: 600;
line-height: 1.3;
transition: color 0.3s ease;
}

.product-card:hover .product-name {
color: var(--deep-amalfi-rose);
}

.product-bundle-desc {
font-size: 0.75rem;
color: var(--terracotta-gold);
margin-bottom: 12px;
font-weight: 500;
font-style: italic;
}

.price-container {
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
margin-bottom: 6px;
}

.product-cost {
color: var(--deep-amalfi-rose);
font-weight: 600;
font-size: 1.3rem;
}

.product-original-cost {
color: #A09596;
font-size: 1rem;
text-decoration: line-through;
}

.view-samples-hint {
font-size: 0.7rem;
color: var(--deep-amalfi-rose);
margin-top: 8px;
letter-spacing: 1px;
text-transform: uppercase;
font-weight: 600;
animation: pulseHint 2s infinite ease-in-out;
}

/* --- INTERACTIVE POPUP MODAL --- */
.modal-overlay {
display: none;
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background-color: rgba(74, 62, 64, 0.75);
z-index: 1000;
justify-content: center;
align-items: center;
padding: 20px;
backdrop-filter: blur(8px);
transition: opacity 0.3s ease;
}

.modal-card {
background-color: var(--pure-white);
border-radius: 30px;
max-width: 480px;
width: 100%;
padding: 25px;
box-shadow: 0 25px 60px rgba(0,0,0,0.25);
position: relative;
text-align: center;
border: 2px solid var(--main-baby-pink);
/* Smooth Custom Spring Elastic Bounce Fluid Motion */
animation: fluidSpring 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

@keyframes fluidSpring {
from { transform: scale(0.85); opacity: 0; }
to { transform: scale(1); opacity: 1; }
}

.close-modal-btn {
position: absolute;
top: 15px; right: 20px;
font-size: 2.2rem;
cursor: pointer;
color: var(--deep-amalfi-rose);
font-weight: 300;
line-height: 1;
z-index: 10;
transition: transform 0.2s ease, color 0.2s ease;
}

.close-modal-btn:hover {
transform: scale(1.15) rotate(90deg);
color: var(--terracotta-gold);
}

.modal-title {
font-family: 'Cinzel', serif;
font-size: 1.4rem;
color: var(--text-olive-charcoal);
margin-bottom: 4px;
}

.zoom-display-container {
width: 100%;
height: 380px;
border-radius: 20px;
overflow: hidden;
margin: 15px 0;
background-color: var(--bg-palazzo-pink);
border: 1px solid rgba(255, 192, 203, 0.4);
position: relative;
}

.zoom-main-img {
width: 100%;
height: 100%;
object-fit: cover;
transition: opacity 0.25s ease-in-out, transform 0.4s ease;
}

/* Sample Thumbnails Row */
.samples-gallery-grid {
display: flex;
gap: 12px;
justify-content: center;
overflow-x: auto;
padding: 10px 5px;
margin-top: 5px;
}

.gallery-sample-item {
width: 70px;
height: 70px;
object-fit: cover;
border-radius: 12px;
border: 2px solid transparent;
box-shadow: 0 4px 8px rgba(0,0,0,0.06);
cursor: pointer;
transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
flex-shrink: 0;
}

.gallery-sample-item:hover {
transform: translateY(-4px) scale(1.04);
}

.gallery-sample-item.active-thumbnail {
border-color: var(--deep-amalfi-rose);
transform: scale(1.08);
box-shadow: 0 6px 15px rgba(195, 106, 122, 0.25);
}

/* --- GLOBAL ORDER FORM BUTTON --- */
.order-action-container {
text-align: center;
margin: 60px auto 20px auto;
max-width: 420px;
}

.global-order-btn {
background: linear-gradient(135deg, var(--main-baby-pink) 0%, var(--terracotta-gold) 100%);
color: var(--pure-white);
border: none;
padding: 18px 40px;
border-radius: 40px;
cursor: pointer;
font-family: 'Cinzel', serif;
font-size: 1.2rem;
letter-spacing: 3px;
text-transform: uppercase;
width: 100%;
font-weight: 600;
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
animation: buttonPulse 2s infinite ease-in-out;
transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.global-order-btn:hover {
background: linear-gradient(135deg, var(--deep-amalfi-rose) 0%, var(--main-baby-pink) 100%);
transform: scale(1.04) translateY(-3px);
box-shadow: 0 16px 35px rgba(195, 106, 122, 0.5);
}

footer {
text-align: center;
padding: 60px 20px;
margin-top: 80px;
border-top: 3px double var(--main-baby-pink);
background: linear-gradient(to bottom, var(--bg-palazzo-pink), #FFFFFF);
color: var(--text-olive-charcoal);
font-size: 0.85rem;
}
</style>
</head>
<body>

<header>
<div class="logo-container">
<h1 class="logo-main">Studio</h1>
<span class="logo-sub">de Garela</span>
<div class="bow-divider">... ୨୧ ⚜ ୨୧ ...</div>
<p class="tagline">timeless craft — beyond trends.</p>
</div>
</header>

<div class="container">
<section id="view-shop">
<h2 class="section-title">The Resort Collection</h2>
<div class="products-grid" id="catalog-injection-point"></div>

<div class="order-action-container">
<button class="global-order-btn" onclick="redirectToOrderForm()">
<span>Order Form</span> ୨୧
</button>
</div>
</section>
</div>

<div id="galleryModal" class="modal-overlay" onclick="closeSampleGallery(event)">
<div class="modal-card">
<span class="close-modal-btn" onclick="forceCloseGallery()">&times;</span>
<h3 class="modal-title" id="modalTitle">Product Gallery</h3>
<div class="zoom-display-container">
    <img id="mainZoomedImage" src="" alt="Main Preview View" class="zoom-main-img">
</div>
<div class="samples-gallery-grid" id="modalGalleryInjected"></div>
</div>
</div>

<footer>
<p style="font-family: 'Cinzel', serif; font-weight: 600; letter-spacing: 2px;">Studio de Garela — Est. 2026</p>
<p style="font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--deep-amalfi-rose);">Amalfi Skies &amp; Coquette Bows — Designed For You.</p>
</footer>

<script>
const ORDER_FORM_URL = "https://docs.google.com/forms/d/e/YOUR_FORM_ID_HERE/viewform";

// CATALOG MASTER INVENTORY ARRAY
const studioProducts = [
{ id: 30, name: "iPhone 13 Case Bundle", price: 259, originalPrice: 349, image: "Iphone 13 plain.jpg", bundle: "Charms, Ribbons & Ponytails by Pair", samples: ["Iphone 13 plain.jpg", "iphone13image1.jpg", "iphone13image2.jpg", "iphone13image3.jpg"] },
{ id: 31, name: "iPhone 13 Pro Case Bundle", price: 259, originalPrice: 349, image: "placeholder.jpg", bundle: "Charms, Ribbons & Ponytails by Pair", samples: [] },
{ id: 32, name: "iPhone 13 Pro Max Case Bundle", price: 259, originalPrice: 349, image: "placeholder.jpg", bundle: "Charms, Ribbons & Ponytails by Pair", samples: [] },
{ id: 33, name: "iPhone 14 Case Bundle", price: 259, originalPrice: 349, image: "placeholder.jpg", bundle: "Charms, Ribbons & Ponytails by Pair", samples: [] },
{ id: 34, name: "iPhone 14 Plus Case Bundle", price: 259, originalPrice: 349, image: "placeholder.jpg", bundle: "Charms, Ribbons & Ponytails by Pair", samples: [] },
{ id: 35, name: "iPhone 14 Pro Case Bundle", price: 259, originalPrice: 349, image: "placeholder.jpg", bundle: "Charms, Ribbons & Ponytails by Pair", samples: [] },
{ id: 36, name: "iPhone 14 Pro Max Case Bundle", price: 259, originalPrice: 349, image: "placeholder.jpg", bundle: "Charms, Ribbons & Ponytails by Pair", samples: [] },
{ id: 37, name: "iPhone 15 Case Bundle", price: 259, originalPrice: 349, image: "placeholder.jpg", bundle: "Charms, Ribbons & Ponytails by Pair", samples: [] },
{ id: 38, name: "iPhone 15 Plus Case Bundle", price: 259, originalPrice: 349, image: "placeholder.jpg", bundle: "Charms, Ribbons & Ponytails by Pair", samples: [] },
{ id: 39, name: "iPhone 15 Pro Case Bundle", price: 259, originalPrice: 349, image: "placeholder.jpg", bundle: "Charms, Ribbons & Ponytails by Pair", samples: [] },
{ id: 40, name: "iPhone 15 Pro Max Case Bundle", price: 259, originalPrice: 349, image: "placeholder.jpg", bundle: "Charms, Ribbons & Ponytails by Pair", samples: [] },
{ id: 41, name: "iPhone 16 Case Bundle", price: 259, originalPrice: 349, image: "placeholder.jpg", bundle: "Charms, Ribbons & Ponytails by Pair", samples: [] },
{ id: 42, name: "iPhone 16 Plus Case Bundle", price: 259, originalPrice: 349, image: "placeholder.jpg", bundle: "Charms, Ribbons & Ponytails by Pair", samples: [] },
{ id: 43, name: "iPhone 16 Pro Case Bundle", price: 259, originalPrice: 349, image: "placeholder.jpg", bundle: "Charms, Ribbons & Ponytails by Pair", samples: [] },
{ id: 44, name: "iPhone 16 Pro Max Case Bundle", price: 259, originalPrice: 349, image: "placeholder.jpg", bundle: "Charms, Ribbons & Ponytails by Pair", samples: [] },
{ id: 45, name: "iPhone 17 Case Bundle", price: 259, originalPrice: 349, image: "placeholder.jpg", bundle: "Charms, Ribbons & Ponytails by Pair", samples: [] },
{ id: 46, name: "iPhone 17 Pro Case Bundle", price: 259, originalPrice: 349, image: "placeholder.jpg", bundle: "Charms, Ribbons & Ponytails by Pair", samples: [] },
{ id: 47, name: "iPhone 17 Pro Max Case Bundle", price: 259, originalPrice: 349, image: "placeholder.jpg", bundle: "Charms, Ribbons & Ponytails by Pair", samples: [] }
];

document.addEventListener("DOMContentLoaded", () => {
renderCatalogGrid();
});

function renderCatalogGrid() {
const container = document.getElementById('catalog-injection-point');
container.innerHTML = studioProducts.map((product, index) => `
<div class="product-card" style="animation-delay: ${index * 0.05}s" onclick="triggerSampleGallery(${index})">
<div class="sale-badge">Sale!</div>
<div class="product-preview">
<img src="${product.image}" alt="${product.name}" class="product-img" onerror="this.src='placeholder.jpg';">
</div>
<div class="product-details">
<div>
<h3 class="product-name">${product.name}</h3>
<p class="product-bundle-desc">(+ ${product.bundle})</p>
</div>
<div class="price-container">
<p class="product-cost">₱${product.price.toFixed(2)}</p>
<p class="product-original-cost">₱${product.originalPrice.toFixed(2)}</p>
</div>
${product.samples.length > 0 ? `<div class="view-samples-hint">✨ View Gallery</div>` : ''}
</div>
</div>
`).join('');
}

function triggerSampleGallery(index) {
const targetProduct = studioProducts[index];
if (!targetProduct.samples || targetProduct.samples.length === 0) return;

document.getElementById('modalTitle').innerText = targetProduct.name;

const mainZoomNode = document.getElementById('mainZoomedImage');
mainZoomNode.src = targetProduct.samples[0];

const galleryImgContainer = document.getElementById('modalGalleryInjected');

galleryImgContainer.innerHTML = targetProduct.samples.map((imageUrl, imgIdx) => `
<img src="${imageUrl}" 
     alt="Sample View ${imgIdx}" 
     class="gallery-sample-item ${imgIdx === 0 ? 'active-thumbnail' : ''}" 
     onclick="switchFocusedZoomImage(this, '${imageUrl}')"
     onerror="this.src='placeholder.jpg';">
`).join('');

document.getElementById('galleryModal').style.display = 'flex';
}

function switchFocusedZoomImage(thumbnailElement, targetSrc) {
const mainZoomNode = document.getElementById('mainZoomedImage');
mainZoomNode.style.opacity = '0';
mainZoomNode.style.transform = 'scale(0.98)';

setTimeout(() => {
    mainZoomNode.src = targetSrc;
    mainZoomNode.style.opacity = '1';
    mainZoomNode.style.transform = 'scale(1)';
}, 200);

document.querySelectorAll('.gallery-sample-item').forEach(img => {
    img.classList.remove('active-thumbnail');
});

thumbnailElement.classList.add('active-thumbnail');
}

function closeSampleGallery(event) {
if (event.target.id === "galleryModal") {
document.getElementById('galleryModal').style.display = 'none';
}
}

function forceCloseGallery() {
document.getElementById('galleryModal').style.display = 'none';
}

function redirectToOrderForm() {
window.open(ORDER_FORM_URL, '_blank');
}
</script>
</body>
</html>
