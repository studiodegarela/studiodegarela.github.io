<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio de Garela | Mediterranean Pink Elegance</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Monsieur+La+Doulaise&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* --- COLOR PALETTE & GLOBAL VARIABLES --- */
:root {
--bg-palazzo-pink: #FFF0F2; /* Sun-bleached Mediterranean pink palace walls */
--main-baby-pink: #FFC0CB; /* Classic sweet coquette baby pink */
--terracotta-gold: #E89E9B; /* Warm Mediterranean tile gold-blush */
--deep-amalfi-rose: #C36A7A; /* Deep rich rose accent for typography */
--text-olive-charcoal: #4A3E40; /* Soft dark earthy charcoal with a hint of warm tone */
--pure-white: #FFFFFF;
--sale-red: #D9383A; /* Beautiful rich red for the sale badge */
}

* {
box-sizing: border-box;
margin: 0;
padding: 0;
font-family: 'Poppins', sans-serif;
}

body {
background-color: var(--bg-palazzo-pink);
color: var(--text-olive-charcoal);
overflow-x: hidden;
/* Mediterranean Majolica / Portuguese Tile Tile Motif made subtler and pinker */
background-image:
radial-gradient(circle at 50% 50%, rgba(255, 192, 203, 0.15) 20%, transparent 20%, transparent 80%, rgba(255, 192, 203, 0.15) 80%),
radial-gradient(circle at 0% 0%, rgba(232, 158, 155, 0.1) 40%, transparent 40%),
radial-gradient(circle at 100% 0%, rgba(232, 158, 155, 0.1) 40%, transparent 40%),
radial-gradient(circle at 100% 100%, rgba(232, 158, 155, 0.1) 40%, transparent 40%),
radial-gradient(circle at 0% 100%, rgba(232, 158, 155, 0.1) 40%, transparent 40%);
background-size: 40px 40px;
}

/* --- LOGO & HEADER --- */
header {
background: linear-gradient(to bottom, #FFFFFF, var(--bg-palazzo-pink));
padding: 50px 20px;
text-align: center;
border-bottom: 3px double var(--main-baby-pink);
position: relative;
}

/* Architectural Arch motif behind the header */
header::before {
content: '';
position: absolute;
bottom: 0;
left: 50%;
transform: translateX(-50%);
width: 180px;
height: 90px;
background: rgba(255, 255, 255, 0.4);
border-radius: 90px 90px 0 0;
z-index: 0;
}

.logo-container {
max-width: 600px;
margin: 0 auto;
position: relative;
z-index: 1;
}

.logo-main {
font-family: 'Cinzel', serif;
font-size: 3rem;
font-weight: 400;
color: var(--text-olive-charcoal);
line-height: 1.1;
letter-spacing: 4px;
text-transform: uppercase;
}

.logo-sub {
font-family: 'Monsieur La Doulaise', cursive;
font-size: 4.8rem;
color: var(--deep-amalfi-rose);
line-height: 0.6;
margin-bottom: 10px;
display: block;
}

.tagline {
font-family: 'Cinzel', serif;
font-size: 0.75rem;
letter-spacing: 4px;
text-transform: uppercase;
color: var(--terracotta-gold);
margin-top: 15px;
font-weight: 600;
}

.bow-divider {
color: var(--main-baby-pink);
font-size: 1.6rem;
margin: 12px 0;
user-select: none;
letter-spacing: 3px;
}

/* --- CONTAINER STRUCTURE --- */
.container {
max-width: 1200px;
margin: 0 auto;
padding: 40px 20px;
}

.section-title {
text-align: center;
font-family: 'Cinzel', serif;
font-size: 2.2rem;
margin-bottom: 45px;
font-weight: 400;
color: var(--text-olive-charcoal);
letter-spacing: 2px;
}

.section-title::after {
content: '🍊 ୨୧ 🧡 ୨୧ 🍊';
display: block;
font-size: 0.9rem;
color: var(--terracotta-gold);
margin-top: 10px;
letter-spacing: 8px;
}

/* --- PRODUCTS MODULE (Mediterranean Arched Cards) --- */
.products-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 40px;
margin-bottom: 60px;
}

.product-card {
background-color: var(--pure-white);
border-radius: 120px 120px 20px 20px; /* Stunning Palazzo Villa Arch style top */
overflow: hidden;
box-shadow: 0 10px 30px rgba(232, 158, 155, 0.15);
border: 1px solid rgba(255, 192, 203, 0.4);
transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
display: flex;
flex-direction: column;
position: relative;
}

.product-card:hover {
transform: translateY(-8px);
box-shadow: 0 16px 35px rgba(195, 106, 122, 0.25);
}

/* --- FLOATING SALE BADGE --- */
.sale-badge {
position: absolute;
top: 25px;
right: 25px;
background-color: var(--sale-red);
color: var(--pure-white);
font-family: 'Cinzel', serif;
font-size: 0.75rem;
font-weight: 600;
padding: 4px 14px;
border-radius: 20px;
letter-spacing: 1px;
z-index: 10;
box-shadow: 0 4px 10px rgba(217, 56, 58, 0.3);
text-transform: uppercase;
}

.product-preview {
height: 300px;
background: linear-gradient(180deg, rgba(255, 240, 242, 0.5) 0%, rgba(255, 192, 203, 0.3) 100%);
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
position: relative;
overflow: hidden;
border-bottom: 1px dashed var(--main-baby-pink);
}

.product-img {
width: 100%;
height: 100%;
object-fit: cover;
}

/* Ribbon Tie overlays on the arches */
.product-preview::before {
content: '୨୧';
position: absolute;
top: 25px;
font-size: 1.5rem;
color: var(--main-baby-pink);
background: var(--pure-white);
padding: 2px 10px;
border-radius: 20px;
box-shadow: 0 2px 8px rgba(0,0,0,0.05);
z-index: 2;
}

.product-details {
padding: 25px 20px;
text-align: center;
flex-grow: 1;
display: flex;
flex-direction: column;
justify-content: space-between;
background: linear-gradient(to bottom, #FFFFFF, var(--bg-palazzo-pink));
}

.product-name {
font-family: 'Cinzel', serif;
font-size: 1.15rem;
color: var(--text-olive-charcoal);
margin-bottom: 4px;
font-weight: 600;
line-height: 1.3;
}

.product-bundle-desc {
font-size: 0.75rem;
color: var(--terracotta-gold);
margin-bottom: 12px;
font-weight: 500;
font-style: italic;
}

.price-container {
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
margin-bottom: 6px;
}

.product-cost {
color: var(--deep-amalfi-rose);
font-family: 'Poppins', sans-serif;
font-weight: 600;
font-size: 1.3rem;
}

.product-original-cost {
color: #A09596;
font-family: 'Poppins', sans-serif;
font-size: 1rem;
text-decoration: line-through;
font-weight: 400;
}

/* --- MEDITERRANEAN RIBBON BUTTON --- */
.order-action-container {
text-align: center;
margin: 50px auto 20px auto;
max-width: 420px;
}

.global-order-btn {
background: linear-gradient(135deg, var(--main-baby-pink) 0%, var(--terracotta-gold) 100%);
color: var(--pure-white);
border: none;
padding: 18px 40px;
border-radius: 40px;
cursor: pointer;
font-family: 'Cinzel', serif;
font-size: 1.2rem;
letter-spacing: 3px;
text-transform: uppercase;
transition: all 0.3s ease;
width: 100%;
box-shadow: 0 10px 25px rgba(195, 106, 122, 0.3);
font-weight: 600;
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
}

.global-order-btn:hover {
background: linear-gradient(135deg, var(--deep-amalfi-rose) 0%, var(--main-baby-pink) 100%);
transform: scale(1.03) translateY(-2px);
box-shadow: 0 14px 30px rgba(195, 106, 122, 0.45);
}

/* --- FOOTER REGION --- */
footer {
text-align: center;
padding: 60px 20px;
margin-top: 80px;
border-top: 3px double var(--main-baby-pink);
background: linear-gradient(to bottom, var(--bg-palazzo-pink), #FFFFFF);
color: var(--text-olive-charcoal);
font-size: 0.85rem;
}

footer p { margin-bottom: 8px; }
</style>
</head>
<body>

<header>
<div class="logo-container">
<h1 class="logo-main">Studio</h1>
<span class="logo-sub">de Garela</span>
<div class="bow-divider">... ୨୧ ⚜ ୨୧ ...</div>
<p class="tagline">timeless craft — beyond trends.</p>
</div>
</header>

<div class="container">

<section id="view-shop">
<h2 class="section-title">The Resort Collection</h2>

<div class="products-grid" id="catalog-injection-point">
</div>

<div class="order-action-container">
<button class="global-order-btn" onclick="redirectToOrderForm()">
<span>Order Form</span> ୨୧
</button>
</div>
</section>

</div>

<footer>
<p style="font-family: 'Cinzel', serif; font-weight: 600; letter-spacing: 2px;">Studio de Garela — Est. 2026</p>
<p style="font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--deep-amalfi-rose);">Amalfi Skies &amp; Coquette Bows — Designed For You.</p>
</footer>

document.addEventListener("DOMContentLoaded", () => {

// CATALOG VIEW GENERATOR
function renderCatalogGrid() {

function redirectToOrderForm() {

</script>
</body>
</html>
