<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio de Garela | Mediterranean Pink Elegance</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Monsieur+La+Doulaise&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-palazzo-pink: #FFF0F2;
            --main-baby-pink: #FFC0CB;
            --terracotta-gold: #E89E9B;
            --deep-amalfi-rose: #C36A7A;
            --text-olive-charcoal: #4A3E40;
            --pure-white: #FFFFFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #FFF0F2 0%, #FFE4E9 100%); min-height: 100vh; padding-bottom: 50px; }

        header { padding: 60px 20px; text-align: center; }
        .logo-main { font-family: 'Cinzel', serif; font-size: 3rem; letter-spacing: 10px; color: var(--deep-amalfi-rose); text-transform: uppercase; }
        .logo-sub { font-family: 'Monsieur La Doulaise', cursive; font-size: 5rem; color: var(--deep-amalfi-rose); display: block; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        
        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; 
            padding: 20px;
        }

        .product-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            border-radius: 40px; 
            padding: 30px; 
            text-align: center; 
            border: 2px solid var(--pure-white); 
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: visible; 
        }
        
        .product-card:hover { transform: translateY(-10px); border-color: var(--terracotta-gold); }
        
        .add-btn { background: var(--terracotta-gold); color: white; border: none; padding: 10px 30px; border-radius: 20px; cursor: pointer; }
        .cart-widget { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .cart-drawer { display: none; position: absolute; right: 0; top: 60px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 300px; }
        
        .img-placeholder { height: 150px; background: var(--main-baby-pink); border-radius: 25px; margin-bottom: 15px; width: 100%; }
        h3 { font-size: 1.1rem; line-height: 1.4; padding: 0 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <h1 class="logo-main">Studio</h1>
    <span class="logo-sub">de Garela</span>
    <div class="cart-widget">
        <button onclick="toggleCart()" class="add-btn">🛒 View Cart</button>
        <div id="cartDrawer" class="cart-drawer">
            <h3>Your Cart</h3>
            <div id="cartItems"></div>
            <button onclick="checkout()" class="add-btn" style="width:100%; margin-top:10px;">Checkout Now</button>
        </div>
    </div>
</header>

<div class="container">
    <div class="products-grid" id="catalog-injection-point"></div>
</div>

<script>
const ORDER_FORM_URL = "https://docs.google.com/forms/d/e/YOUR_FORM_ID_HERE/viewform";
let cart = [];

const products = [
    { id: 1, name: "iPhone 13 Case Bundle", price: 259 },
    { id: 2, name: "iPhone 14 Case Bundle", price: 259 },
    { id: 3, name: "iPhone 15 Case Bundle", price: 259 },
    { id: 4, name: "iPhone 16 Case Bundle", price: 259 }
];

function renderCatalog() {
    const container = document.getElementById('catalog-injection-point');
    container.innerHTML = products.map((p, i) => `
        <div class="product-card">
            <div class="img-placeholder"></div>
            <h3>${p.name}</h3>
            <p>₱${p.price}</p>
            <div style="margin:15px 0;">
                <input type="number" id="qty-${p.id}" value="1" min="1" style="width:50px; text-align:center; padding:5px;">
                <button class="add-btn" onclick="addToCart(${i})">Add</button>
            </div>
        </div>
    `).join('');
}

function addToCart(i) {
    const p = products[i];
    const qty = document.getElementById(`qty-${p.id}`).value;
    cart.push({...p, quantity: qty});
    alert(p.name + " added to cart!");
}

function toggleCart() {
    const drawer = document.getElementById('cartDrawer');
    drawer.style.display = (drawer.style.display === 'block') ? 'none' : 'block';
    document.getElementById('cartItems').innerHTML = cart.length === 0 ? '<p>Empty</p>' : 
        cart.map(item => `<div>${item.name} (x${item.quantity})</div>`).join('');
}

function checkout() {
    if(cart.length === 0) return alert("Your cart is empty!");
    window.open(ORDER_FORM_URL, '_blank');
}

renderCatalog();
</script>
</body>
</html>
